<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://www.tiktok.com/discover/foto-de-perfil-engra%C3%A7ada-para-zap" class="avatar">
      <div>
        <span class="name">Aninha</span>
        <span class="username">@userpedrezini</span>
      </div>
    </div>

    <p class="post-text">
     não vejo a hora de entrar na faculdade logo
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <div class="post-actions">
      <button id="deslikeBtn">Descurtir</button>
      <span id="deslikeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="https://br.pinterest.com/alemascarenhas5/fotos-engra%C3%A7adas-para-perfil/" class="avatar-small">
        <p>alo univas </p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p> fé que a federal sai!</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
